spring:
  datasource:
    url: jdbc:mysql://mysql/beatify?useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: mysql-root-password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      fail-on-empty-beans: false

server:
  port: 8080

beatify:
  jwt:
    secret: beatify-super-secret-key-that-is-at-least-256-bits-long-for-hs256
    expiration-ms: 86400000
  media:
    path: /media/
